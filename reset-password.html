<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — DWASA Admin</title>
<link rel="stylesheet" href="style.css">
<style>
body { background:#f0f4f1; }
.reset-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,var(--green-dark),#0e3d1a);
}
.reset-box {
  background:var(--white); border-radius:20px;
  padding:48px 40px; max-width:420px; width:100%;
  box-shadow:0 24px 80px rgba(0,0,0,0.3);
  text-align:center;
}
.reset-box img { height:72px; margin:0 auto 16px; }
.reset-box h2 { margin-bottom:4px; }
.reset-box p { font-size:0.9rem; margin-bottom:28px; }
.reset-box input {
  width:100%; padding:14px 18px; border:1.5px solid #dde8df;
  border-radius:8px; font-size:1rem; outline:none; margin-bottom:14px;
}
.reset-box input:focus { border-color:var(--green-mid); box-shadow:0 0 0 3px rgba(45,138,71,0.12); }
.reset-msg { font-size:0.88rem; display:none; margin-bottom:12px; padding:10px; border-radius:8px; }
.btn-reset { width:100%; padding:14px; background:var(--green-dark); color:var(--white); border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; }
.btn-reset:hover { background:var(--green-mid); }
.btn-reset:disabled { opacity:0.6; cursor:not-allowed; }
</style>
</head>
<body>

<div class="reset-screen">
  <div class="reset-box">
    <img src="images/logo.png" alt="DWASA">
    <h2>Set New Password</h2>
    <p style="color:var(--gray);">Choose a new password for your admin account</p>

    <div class="reset-msg" id="resetMsg"></div>

    <div id="resetForm">
      <input type="password" id="newPwd1" placeholder="New password (min 6 characters)" autocomplete="new-password">
      <input type="password" id="newPwd2" placeholder="Confirm new password" autocomplete="new-password">
      <button class="btn-reset" id="resetBtn" onclick="setNewPassword()">Update Password</button>
    </div>

    <p style="margin-top:20px;font-size:0.85rem;"><a href="admin.html" style="color:var(--green-dark);">Back to Login</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
function showMsg(text, isError) {
  const el = document.getElementById('resetMsg');
  el.style.display = 'block';
  el.style.color = isError ? '#d32f2f' : 'var(--green-dark)';
  el.style.background = isError ? '#fdecea' : 'var(--green-light)';
  el.textContent = text;
}

// Supabase puts the recovery token in the URL hash automatically when the
// reset-password link is clicked; supabase-js picks it up and creates a
// temporary recovery session, allowing updateUser() to work below.
(async function checkRecoverySession() {
  const { data } = await supabaseClient.auth.getSession();
  if (!data.session) {
    showMsg('This reset link is invalid or has expired. Please request a new one from the admin login page.', true);
    document.getElementById('resetForm').style.display = 'none';
  }
})();

async function setNewPassword() {
  const p1 = document.getElementById('newPwd1').value;
  const p2 = document.getElementById('newPwd2').value;
  const btn = document.getElementById('resetBtn');

  if (!p1 || p1.length < 6) { showMsg('Password must be at least 6 characters', true); return; }
  if (p1 !== p2) { showMsg('Passwords do not match', true); return; }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  try {
    const { error } = await supabaseClient.auth.updateUser({ password: p1 });
    if (error) throw error;
    showMsg('✅ Password updated! Redirecting to login...', false);
    setTimeout(() => { window.location.href = 'admin.html'; }, 2000);
  } catch (err) {
    showMsg('❌ ' + err.message, true);
    btn.disabled = false;
    btn.textContent = 'Update Password';
  }
}
</script>
</body>
</html>
